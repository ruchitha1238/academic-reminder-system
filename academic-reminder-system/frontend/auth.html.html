<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Anti-Gravity System</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="auth-card" id="authCard">
            <!-- Toggle Tabs -->
            <div class="tabs">
                <div class="tab-slider"></div>
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="form-wrapper" id="loginForm">
                <div class="header">
                    <h1>Welcome Back</h1>
                    <p>Enter your credentials to access your dashboard</p>
                </div>
                <form onsubmit="handleSubmit(event, 'login')">
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Login</span>
                        <div class="btn-glow"></div>
                    </button>
                </form>
            </div>

            <!-- Sign Up Form (Hidden by default) -->
            <div class="form-wrapper hidden" id="signupForm">
                <div class="header">
                    <h1>Create Account</h1>
                    <p>Join the future of intelligent organization</p>
                </div>
                <form onsubmit="handleSubmit(event, 'signup')">
                    <div class="input-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label for="signupConfirm">Confirm Password</label>
                        <input type="password" id="signupConfirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Sign Up</span>
                        <div class="btn-glow"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
